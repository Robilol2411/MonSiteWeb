<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compétences — Robin Matelot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-bracket">&lt;</span>RM<span class="logo-bracket">/&gt;</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html#about"    class="nav-link">À propos</a>
                <a href="index.html#skills"   class="nav-link">Compétences</a>
                <a href="index.html#projects" class="nav-link">Projets</a>
                <a href="index.html#contact"  class="nav-link">Contact</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Changer le thème" title="Changer le thème">
                    <span class="theme-icon" id="themeIcon" aria-hidden="true">🌙</span>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false" aria-controls="navLinks">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <header id="skills-header" style="padding-top:150px; padding-bottom:50px; text-align:center; background-color:var(--bg-secondary);">
        <div class="container reveal active">
            <span class="section-label">02. COMPÉTENCES</span>
            <h1 class="section-title">Mon <span class="accent">stack</span> tech</h1>
            <div class="section-line" style="margin: 0 auto;"></div>
        </div>
    </header>

    <section id="skills" class="section">
        <div class="container">
            <div class="skills-container">
                <div class="skill-group reveal">
                    <div class="skill-group-header">
                        <i class="fas fa-code skill-group-icon" aria-hidden="true"></i>
                        <h3>Langages</h3>
                    </div>
                    <div class="skill-tags">
                        <div class="skill-tag"><i class="fab fa-js-square"></i> JavaScript</div>
                        <div class="skill-tag"><i class="fab fa-python"></i> Python</div>
                        <div class="skill-tag"><i class="fab fa-java"></i> Java</div>
                        <div class="skill-tag">⚙️ C</div>
                        <div class="skill-tag">⚙️ C++</div>
                        <div class="skill-tag"><i class="fab fa-php"></i> PHP</div>
                        <div class="skill-tag"><i class="fab fa-html5"></i> HTML/CSS</div>
                        <div class="skill-tag">🗄️ SQL</div>
                    </div>
                </div>

                <div class="skill-group reveal reveal-delay">
                    <div class="skill-group-header">
                        <i class="fas fa-layer-group skill-group-icon"></i>
                        <h3>Frameworks & Moteurs</h3>
                    </div>
                    <div class="skill-tags">
                        <div class="skill-tag tag-accent"><i class="fab fa-react"></i> React</div>
                        <div class="skill-tag tag-accent"><i class="fab fa-symfony"></i> Symfony</div>
                        <div class="skill-tag tag-accent">🎮 Godot</div>
                    </div>
                </div>

                <div class="skill-group reveal reveal-delay2">
                    <div class="skill-group-header">
                        <i class="fas fa-rocket skill-group-icon"></i>
                        <h3>Intérêts IA / Cyber</h3>
                    </div>
                    <div class="skill-tags">
                        <div class="skill-tag tag-yellow-alt">📊 Data Science</div>
                        <div class="skill-tag tag-yellow-alt">🛡️ Cybersécurité</div>
                        <div class="skill-tag tag-yellow-alt">🤖 IA / Machine Learning</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer id="footer">
        <div class="container footer-inner">
            <div class="footer-logo">
                <span class="logo-bracket">&lt;</span>RM<span class="logo-bracket">/&gt;</span>
            </div>
            <p class="footer-text">
                Robin <span class="yellow">Matelot</span>
            </p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
