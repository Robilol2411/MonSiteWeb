<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Robin Matelot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-bracket">&lt;</span>RM<span class="logo-bracket">/&gt;</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html#about"    class="nav-link">À propos</a>
                <a href="index.html#skills"   class="nav-link">Compétences</a>
                <a href="index.html#projects" class="nav-link">Projets</a>
                <a href="index.html#contact"  class="nav-link">Contact</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Changer le thème">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <header id="contact-header" style="padding-top:150px; padding-bottom:50px; text-align:center; background-color:var(--bg-secondary);">
        <div class="container reveal active">
            <span class="section-label">04. CONTACT</span>
            <h1 class="section-title">Retrouvez mes <span class="accent">projets</span></h1>
            <div class="section-line" style="margin: 0 auto;"></div>
        </div>
    </header>

    <section id="contact" class="section">
        <div class="container">
            <div class="contact-wrapper reveal">
                <p class="contact-intro">
                     N'hésite pas à me retrouver sur GitHub !
                </p>

                <div class="contact-cards">
                    <a href="https://github.com/Robilol2411" target="_blank" rel="noopener" class="contact-card">
                        <div class="contact-card-icon">
                            <i class="fab fa-github"></i>
                        </div>
                        <div class="contact-card-info">
                            <span class="contact-card-title">GitHub</span>
                            <span class="contact-card-sub">@Robilol2411</span>
                        </div>
                        <i class="fas fa-arrow-up-right-from-square contact-card-arrow"></i>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <footer id="footer">
        <div class="container footer-inner">
            <div class="footer-logo">
                <span class="logo-bracket">&lt;</span>RM<span class="logo-bracket">/&gt;</span>
            </div>
            <p class="footer-text">
                Robin <span class="yellow">Matelot</span>
            </p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
