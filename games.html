<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Interactive Games — Robin Matelot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .games-layout {
            padding-top: 120px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-interface-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .settings-bar {
            display: flex;
            gap: 1.5rem;
            background: var(--bg-tertiary);
            padding: 0.8rem 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }

        .setting-item { display: flex; align-items: center; gap: 8px; }

        select, button.setting-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            outline: none;
        }

        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .turn-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-player1 { background-color: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .dot-player2 { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .board-wrapper {
            background-color: var(--bg-tertiary);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
        }

        #game-board {
            display: grid;
            gap: 8px;
            background-color: var(--border-color);
            padding: 8px;
            border-radius: 8px;
            width: fit-content;
        }

        .cell {
            width: 60px;
            height: 60px;
            background-color: var(--bg-primary);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 1.5rem;
            position: relative;
        }

        .cell:hover { background-color: var(--bg-secondary); z-index: 2; }
        .cell.possible-move::after {
            content: "";
            width: 12px;
            height: 12px;
            background-color: rgba(38, 183, 57, 0.5);
            border-radius: 50%;
            position: absolute;
        }
        .cell.selected {
            background-color: rgba(255, 222, 87, 0.15);
            border: 2px solid var(--accent-yellow);
        }

        .piece {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            transition: all 0.3s ease;
            z-index: 5;
        }

        .p1-pawn { background-color: #3b82f6; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .p2-pawn { background-color: #ef4444; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .p1-queen { background: linear-gradient(135deg, #3b82f6, #93c5fd); border: 2px solid #fff; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); border-radius: 50%; }
        .p2-queen { background: linear-gradient(135deg, #ef4444, #f87171); border: 2px solid #fff; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); border-radius: 50%; }

        /* Terminal Emulator */
        #game-terminal {
            width: 100%;
            max-width: 820px;
            height: 520px;
            background-color: #0c0c0c;
            color: #00ff41;
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            padding: 2.5rem;
            border-radius: 12px 12px 0 0;
            overflow-y: auto;
            overflow-x: hidden;
            border: 2px solid #333;
            font-size: 0.85rem;
            line-height: 1.25;
            display: none;
            scrollbar-width: thin;
            scrollbar-color: #333 #0c0c0c;
            white-space: pre;
            box-shadow: inset 0 0 50px rgba(0, 255, 65, 0.05);
        }

        #terminal-input-container {
            display: none;
            align-items: center;
            background: #151515;
            padding: 1rem 1.5rem;
            border-radius: 0 0 12px 12px;
            border: 2px solid #333;
            border-top: none;
            color: #00ff41;
            font-family: 'JetBrains Mono', monospace;
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
        }

        #terminal-input {
            background: transparent;
            border: none;
            color: #00ff41;
            flex: 1;
            outline: none;
            padding-left: 10px;
            font-size: 1rem;
        }

        .rules-card { background-color: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; max-width: 900px; text-align: left; }
        .rules-title { display: flex; align-items: center; gap: 10px; font-weight: 700; margin-bottom: 0.8rem; color: var(--accent-yellow); }
        .rules-item { margin-bottom: 0.4rem; display: flex; gap: 10px; font-size: 0.9rem; }
        .rules-dot { color: var(--accent-yellow); }

        .game-selector { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; justify-content: center; }
        .game-btn { padding: 0.8rem 1.2rem; border-radius: 8px; background-color: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); cursor: pointer; font-weight: 600; transition: var(--transition); }
        .game-btn.active { background-color: var(--accent-yellow-soft); border-color: var(--accent-yellow); color: var(--accent-yellow); }
    </style>
</head>
<body>

    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-bracket">&lt;</span>RM<span class="logo-bracket">/&gt;</span>
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html#about"    class="nav-link">À propos</a>
                <a href="index.html#skills"   class="nav-link">Compétences</a>
                <a href="index.html#projects" class="nav-link">Parcours</a>
                <a href="index.html#contact"  class="nav-link">GitHub</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Changer le thème">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="games-layout">
        <div class="container" style="text-align: center;">
            <span class="section-label">INTERACTIVE LAB</span>
            <h1 class="section-title">Jeux <span class="accent">Interactifs</span></h1>
            
            <div class="game-selector">
                <button class="game-btn active" id="btn-snort" onclick="switchGame('snort')">Snort</button>
                <button class="game-btn" id="btn-dodgem" onclick="switchGame('dodgem')">Dodgem</button>
                <button class="game-btn" id="btn-reines" onclick="switchGame('reines')">Reines</button>
                <button class="game-btn" id="btn-pokemon" onclick="switchGame('pokemon')">Pokémon C-Dev</button>
            </div>

            <div class="game-interface-container">
                <div class="settings-bar" id="game-settings">
                    <div class="setting-item" id="size-setting">
                        <i class="fas fa-th-large"></i> Taille : 
                        <select id="board-size-select" onchange="updateBoardSize(this.value)">
                            <option value="6">6x6</option>
                            <option value="8">8x8</option>
                            <option value="10">10x10</option>
                        </select>
                    </div>
                    <div class="setting-item" id="mode-setting">
                        <i class="fas fa-users"></i> Mode : 
                        <select id="game-mode-select" onchange="updateGameMode(this.value)">
                            <option value="ia" selected>Joueur vs IA</option>
                            <option value="pvp">Joueur vs Joueur</option>
                        </select>
                    </div>
                </div>

                <div class="game-header" id="game-info">
                    <div class="turn-indicator" id="turn-indicator">
                        <span class="turn-dot dot-player1"></span>
                        <span id="player-name">Joueur 1</span>
                    </div>
                    <div class="game-actions">
                        <button class="btn btn-primary" style="padding: 0.5rem 1rem;" onclick="resetGame()">
                            <i class="fas fa-undo"></i> Reset
                        </button>
                    </div>
                </div>

                <div class="rules-card">
                    <div class="rules-title"><i class="fas fa-info-circle"></i> <span id="rules-title">Règles : Snort</span></div>
                    <div class="rules-text" id="rules-text"></div>
                </div>

                <div class="board-wrapper">
                    <div id="game-board"></div>
                    <div id="pokemon-terminal-container" style="width: 100%; display: none; flex-direction: column; align-items: center;">
                        <div id="game-terminal"></div>
                        <div id="terminal-input-container">
                            <span>C:\DEV\POKEMON> </span>
                            <input type="text" id="terminal-input" placeholder="Entrez une commande..." autocomplete="off">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentGame = 'snort';
        let boardState = [];
        let boardSize = 6;
        let currentPlayer = 1;
        let selectedCell = null;
        let isGameOver = false;
        let gameMode = 'ia'; // ia or pvp
        let possibleMoves = [];

        // Pokémon State
        let pokemonState = {
            pokemons: [],
            player: { pokedex: [], numberPokemon: 0, items: {potions: 5, "poke-balls": 5} },
            gameState: 'start', // start, main, wild, shop, center, pokedex
            outputBuffer: ""
        };

        const RULES = {
            snort: `
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>Jeu :</strong> Placez un pion chacun votre tour.</span></div>
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>Interdit :</strong> Poser un pion à côté d'un pion d'une autre couleur.</span></div>
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>But :</strong> Si l'adversaire ne peut plus poser de pion, vous gagnez.</span></div>
            `,
            dodgem: `
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>J1 (Bleu) :</strong> Se déplace N, E, S. Sortez par le bord <strong>DROIT</strong>.</span></div>
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>J2 (Rouge) :</strong> Se déplace N, O, E. Sortez par le bord <strong>HAUT</strong>.</span></div>
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>Sortie :</strong> Pour sortir, <strong>re-cliquez sur votre pion</strong> lorsqu'il est sur le bord de sortie.</span></div>
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>But :</strong> Sortez vos pions ou bloquez l'adversaire.</span></div>
            `,
            reines: `
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>Unités :</strong> Pions (H/V), Reines (Toutes directions). Pas de saut.</span></div>
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>Captures :</strong> Formez un rectangle entre votre Reine et votre pion déplacé.</span></div>
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>Victoire :</strong> Gagnez quand l'adversaire n'a plus que 2 pions.</span></div>
            `,
            pokemon: `
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>Concept :</strong> Explorez le monde, capturez des Pokémon et soignez-les.</span></div>
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>Commandes :</strong> Tapez les chiffres (1, 2, 3...) dans le terminal en bas.</span></div>
                <div class="rules-item"><span class="rules-dot">•</span><span><strong>Combat :</strong> Gérez vos HP et utilisez vos capacités pour gagner.</span></div>
            `
        };

        function switchGame(game) {
            currentGame = game;
            document.querySelectorAll('.game-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${game}`).classList.add('active');
            
            const board = document.getElementById('game-board');
            const terminal = document.getElementById('game-terminal');
            const termContainer = document.getElementById('pokemon-terminal-container');
            const termInput = document.getElementById('terminal-input-container');
            const settings = document.getElementById('game-settings');
            const info = document.getElementById('game-info');
            
            document.getElementById('rules-title').innerText = "Règles : " + (game === 'reines' ? 'Le Jeu des Reines' : game.charAt(0).toUpperCase() + game.slice(1));
            document.getElementById('rules-text').innerHTML = RULES[game];

            if (game === 'pokemon') {
                board.style.display = 'none';
                termContainer.style.display = 'flex';
                settings.style.display = 'none';
                info.style.display = 'none';
                terminal.style.display = 'block';
                termInput.style.display = 'flex';
                initPokemon();
            } else {
                board.style.display = 'grid';
                termContainer.style.display = 'none';
                settings.style.display = 'flex';
                info.style.display = 'flex';
                terminal.style.display = 'none';
                termInput.style.display = 'none';
                boardSize = (game === 'dodgem' ? 3 : 6);
                document.getElementById('size-setting').style.display = (game === 'reines' ? 'flex' : 'none');
                resetGame();
            }
        }

        function updateBoardSize(val) {
            boardSize = parseInt(val);
            resetGame();
        }

        function updateGameMode(val) {
            gameMode = val;
            resetGame();
        }

        function resetGame() {
            isGameOver = false;
            currentPlayer = 1;
            selectedCell = null;
            possibleMoves = [];
            initBoard();
            renderBoard();
            updateTurnUI();
        }

        function initBoard() {
            boardState = [];
            for (let i = 0; i < boardSize; i++) boardState[i] = Array(boardSize).fill(0);
            if (currentGame === 'dodgem') {
                for(let i=0; i<boardSize-1; i++) boardState[0][i] = 3; // J2
                for(let i=1; i<boardSize; i++) boardState[i][boardSize-1] = 1; // J1
            } else if (currentGame === 'reines') {
                let n = boardSize;
                for(let x=0; x<n/2; x++) for(let y=n/2; y<n; y++) boardState[x][y] = 3;
                for(let x=n/2; x<n-1; x++) for(let y=0; y<n/2; y++) boardState[x][y] = 1;
                boardState[n-1][0] = 2; // Q1
                for(let y=1; y<n/2; y++) boardState[n-1][y] = 1;
                boardState[0][n-1] = 4; // Q2
            }
        }

        function renderBoard() {
            const boardEl = document.getElementById('game-board');
            boardEl.style.gridTemplateColumns = `repeat(${boardSize}, 60px)`;
            boardEl.innerHTML = '';
            for (let y = 0; y < boardSize; y++) {
                for (let x = 0; x < boardSize; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (selectedCell && selectedCell.x === x && selectedCell.y === y) cell.classList.add('selected');
                    if (possibleMoves.some(m => m.nx === x && m.ny === y)) cell.classList.add('possible-move');
                    const val = boardState[x][y];
                    if (val !== 0) {
                        const piece = document.createElement('div');
                        piece.className = 'piece ' + getPieceClass(val);
                        cell.appendChild(piece);
                    }
                    cell.onclick = () => handleCellClick(x, y);
                    boardEl.appendChild(cell);
                }
            }
        }

        function getPieceClass(val) {
            return {1: 'p1-pawn', 2: 'p1-queen', 3: 'p2-pawn', 4: 'p2-queen'}[val];
        }

        function handleCellClick(x, y) {
            if (isGameOver) return;
            if (currentGame === 'snort') handleSnortClick(x, y);
            else if (currentGame === 'dodgem') handleDodgemClick(x, y);
            else if (currentGame === 'reines') handleReinesClick(x, y);
            renderBoard();
        }

        // --- SNORT ---
        function handleSnortClick(x, y) {
            if (gameMode === 'ia' && currentPlayer === 2) return;
            if (boardState[x][y] === 0 && canPlaceSnort(x, y, currentPlayer)) {
                boardState[x][y] = currentPlayer === 1 ? 1 : 3;
                if (!checkSnortWin()) { nextTurn(); if (gameMode === 'ia') setTimeout(iaTurnSnort, 500); }
            }
        }
        function canPlaceSnort(x, y, player) {
            const opp = player === 1 ? 3 : 1;
            const ds = [[1,0], [-1,0], [0,1], [0,-1]];
            for(let d of ds) {
                let nx = x + d[0], ny = y + d[1];
                if(nx >= 0 && nx < boardSize && ny >= 0 && ny < boardSize && boardState[nx][ny] === opp) return false;
            }
            return true;
        }
        function checkSnortWin() {
            let nextP = currentPlayer === 1 ? 2 : 1;
            let can = false;
            for(let i=0; i<boardSize; i++) for(let j=0; j<boardSize; j++) if(boardState[i][j] === 0 && canPlaceSnort(i, j, nextP)) can = true;
            if(!can) { endGame(currentPlayer); return true; }
            return false;
        }
        function iaTurnSnort() {
            let moves = [];
            for(let i=0; i<boardSize; i++) for(let j=0; j<boardSize; j++) if(boardState[i][j]===0 && canPlaceSnort(i, j, 2)) moves.push({x:i,y:j});
            if(moves.length > 0) {
                let m = moves[Math.floor(Math.random()*moves.length)];
                boardState[m.x][m.y] = 3;
                if(!checkSnortWin()) nextTurn();
                renderBoard();
            }
        }

        // --- DODGEM ---
        function handleDodgemClick(x, y) {
            if (gameMode === 'ia' && currentPlayer === 2) return;
            const pId = currentPlayer === 1 ? 1 : 3;
            const val = boardState[x][y];
            if (selectedCell) {
                let {x: ax, y: ay} = selectedCell;
                if (ax === x && ay === y) { // Exit logic
                    if ((currentPlayer === 1 && ax === boardSize - 1) || (currentPlayer === 2 && ay === 0)) {
                        boardState[ax][ay] = 0;
                        selectedCell = null; possibleMoves = [];
                        if (!checkDodgemWin()) { nextTurn(); if (gameMode === 'ia') setTimeout(iaTurnDodgem, 500); }
                        return;
                    }
                }
                if (isDodgemMoveValid(ax, ay, x, y, currentPlayer)) {
                    boardState[x][y] = pId; boardState[ax][ay] = 0;
                    selectedCell = null; possibleMoves = [];
                    if (!checkDodgemWin()) { nextTurn(); if (gameMode === 'ia') setTimeout(iaTurnDodgem, 500); }
                } else if (val === pId) selectDodgemPiece(x, y);
                else { selectedCell = null; possibleMoves = []; }
            } else if (val === pId) selectDodgemPiece(x, y);
        }
        function selectDodgemPiece(x, y) {
            selectedCell = {x, y}; possibleMoves = [];
            [[1,0], [-1,0], [0,1], [0,-1]].forEach(([dx, dy]) => {
                if (isDodgemMoveValid(x, y, x + dx, y + dy, currentPlayer)) possibleMoves.push({nx: x+dx, ny: y+dy});
            });
            if ((currentPlayer === 1 && x === boardSize - 1) || (currentPlayer === 2 && y === 0)) possibleMoves.push({nx: x, ny: y});
        }
        function isDodgemMoveValid(ax, ay, nx, ny, p) {
            if (nx < 0 || nx >= boardSize || ny < 0 || ny >= boardSize || boardState[nx][ny] !== 0) return false;
            if (Math.abs(nx - ax) + Math.abs(ny - ay) !== 1) return false;
            if (p === 1 && (nx - ax) === -1) return false;
            if (p === 2 && (ny - ay) === 1) return false;
            return true;
        }
        function checkDodgemWin() {
            let p1 = 0, p2 = 0;
            for(let x=0; x<boardSize; x++) for(let y=0; y<boardSize; y++) { if(boardState[x][y] === 1) p1++; if(boardState[x][y] === 3) p2++; }
            if (p1 === 0) { endGame(1); return true; }
            if (p2 === 0) { endGame(2); return true; }
            let nextPlayer = currentPlayer === 1 ? 2 : 1;
            let nextPId = nextPlayer === 1 ? 1 : 3;
            let can = false;
            for(let x=0; x<boardSize; x++) for(let y=0; y<boardSize; y++) {
                if(boardState[x][y] === nextPId) {
                    if ((nextPlayer === 1 && x === boardSize - 1) || (nextPlayer === 2 && y === 0)) can = true;
                    [[1,0], [-1,0], [0,1], [0,-1]].forEach(([dx, dy]) => { if(isDodgemMoveValid(x,y,x+dx,y+dy, nextPlayer)) can = true; });
                }
            }
            if (!can) { endGame(currentPlayer); return true; }
            return false;
        }
        function iaTurnDodgem() {
            let moves = [];
            for(let x=0; x<boardSize; x++) for(let y=0; y<boardSize; y++) if(boardState[x][y] === 3) {
                if (y === 0) moves.push({ax:x, ay:y, exit:true});
                [[1,0], [-1,0], [0,1], [0,-1]].forEach(([dx, dy]) => { if(isDodgemMoveValid(x,y,x+dx,y+dy, 2)) moves.push({ax:x, ay:y, nx:x+dx, ny:y+dy}); });
            }
            if(moves.length > 0) {
                let m = moves[Math.floor(Math.random()*moves.length)];
                if (m.exit) boardState[m.ax][m.ay] = 0;
                else { boardState[m.nx][m.ny] = 3; boardState[m.ax][m.ay] = 0; }
                if(!checkDodgemWin()) nextTurn();
                renderBoard();
            }
        }

        // --- REINES ---
        function handleReinesClick(x, y) {
            if (gameMode === 'ia' && currentPlayer === 2) return;
            const pId = currentPlayer;
            const myTokens = pId === 1 ? [1, 2] : [3, 4];
            const val = boardState[x][y];
            if (selectedCell) {
                let {x: ax, y: ay} = selectedCell;
                let isQ = boardState[ax][ay] === (pId === 1 ? 2 : 4);
                if (canReinesMove(ax, ay, x, y, isQ)) {
                    boardState[x][y] = boardState[ax][ay]; boardState[ax][ay] = 0;
                    let q = findQueen(pId); captureReines(q.x, q.y, x, y, pId);
                    selectedCell = null; possibleMoves = [];
                    if (!checkReinesWin()) { nextTurn(); if (gameMode === 'ia') setTimeout(iaTurnReines, 600); }
                } else if (myTokens.includes(val)) selectReinesPiece(x, y, pId);
                else { selectedCell = null; possibleMoves = []; }
            } else if (myTokens.includes(val)) selectReinesPiece(x, y, pId);
        }
        function selectReinesPiece(x, y, p) {
            selectedCell = {x, y}; possibleMoves = [];
            let isQ = boardState[x][y] === (p === 1 ? 2 : 4);
            for(let nx=0; nx<boardSize; nx++) for(let ny=0; ny<boardSize; ny++) if (canReinesMove(x, y, nx, ny, isQ)) possibleMoves.push({nx, ny});
        }
        function canReinesMove(ax, ay, nx, ny, isQ) {
            if (nx < 0 || nx >= boardSize || ny < 0 || ny >= boardSize || boardState[nx][ny] !== 0) return false;
            let dx = nx - ax, dy = ny - ay;
            if (dx === 0 && dy === 0) return false;
            if (isQ) { if (Math.abs(dx) !== Math.abs(dy) && dx !== 0 && dy !== 0) return false; }
            else { if (dx !== 0 && dy !== 0) return false; }
            let sx = dx === 0 ? 0 : dx / Math.abs(dx), sy = dy === 0 ? 0 : dy / Math.abs(dy);
            let tx = ax + sx, ty = ay + sy;
            while (tx !== nx || ty !== ny) { if (boardState[tx][ty] !== 0) return false; tx += sx; ty += sy; }
            return true;
        }
        function captureReines(qx, qy, px, py, player) {
            let minX = Math.min(qx, px), maxX = Math.max(qx, px), minY = Math.min(qy, py), maxY = Math.max(qy, py);
            let adversary = player === 1 ? 3 : 1;
            [[minX, minY], [minX, maxY], [maxX, minY], [maxX, maxY]].forEach(([cx, cy]) => { if (boardState[cx][cy] === adversary) boardState[cx][cy] = 0; });
        }
        function findQueen(p) {
            let target = p === 1 ? 2 : 4;
            for(let i=0; i<boardSize; i++) for(let j=0; j<boardSize; j++) if(boardState[i][j] === target) return {x:i, y:j};
        }
        function iaTurnReines() {
            let moves = [];
            for(let x=0; x<boardSize; x++) for(let y=0; y<boardSize; y++) if ([3, 4].includes(boardState[x][y])) {
                let isQ = boardState[x][y] === 4;
                for(let nx=0; nx<boardSize; nx++) for(let ny=0; ny<boardSize; ny++) if (canReinesMove(x, y, nx, ny, isQ)) moves.push({ax:x, ay:y, nx, ny, v: boardState[x][y]});
            }
            if (moves.length > 0) {
                let m = moves[Math.floor(Math.random() * moves.length)];
                boardState[m.nx][m.ny] = m.v; boardState[m.ax][m.ay] = 0;
                let q = findQueen(2); captureReines(q.x, q.y, m.nx, m.ny, 2);
            }
            if(!checkReinesWin()) nextTurn();
            renderBoard();
        }
        function checkReinesWin() {
            let p1 = 0, p2 = 0;
            for(let x=0; x<boardSize; x++) for(let y=0; y<boardSize; y++) { let v = boardState[x][y]; if(v === 1 || v === 2) p1++; if(v === 3 || v === 4) p2++; }
            if (p2 <= 2) { endGame(1); return true; }
            if (p1 <= 2) { endGame(2); return true; }
            return false;
        }

        // --- POKEMON ---
        function initPokemon() {
            pokemonState.pokemons = [
                {name: "Supmander", niv: 1, hp: 10, maxHp: 10, atk: 2, def: 1, vit: 3, moves: ["Scratch", "Growl"]},
                {name: "Suppasaur", niv: 1, hp: 11, maxHp: 11, atk: 1, def: 2, vit: 2, moves: ["Pound", "Shell"]},
                {name: "Supirtle", niv: 1, hp: 9, maxHp: 9, atk: 1, def: 1, vit: 1, moves: ["Pound", "Foliage"]},
                {name: "Rockdog", niv: 1, hp: 12, maxHp: 12, atk: 1, def: 3, vit: 1, moves: ["Bite", "Growl"]}
            ];
            pokemonState.gameState = 'start';
            termPrint("\n    _.----.        ____         ,'  _\\   ___    ___     ____\n _,-'       `.     |    |  / `.   \\,-'    |   \\  /   |   |    \\  |`.\n \\      __    \\    '-.  | /   `.  ___    |    \\/    |   '-.   \\ |  |\n  \\.    \\ \\   |  __  |  |/    ,','_  `.  |          | __  |    \\|  |\n    \\    \\/   /,' _`.|      ,' / / / /   |          ,' _`.|     |  |\n     \\     ,-'/  /   \\    ,'   | \\/ / ,`.|         /  /   \\  |     |\n      \\    \\ |   \\_/  |   `-.  \\    `'  /|  |    ||   \\_/  | |\\    |\n       \\    \\ \\      /       `-.`.___,-' |  |\\  /| \\      /  | |   |\n        \\    \\ `.__,'|  |`-._    `|      |__| \\/ |  `.__,'|  | |   |\n         \\_.-'       |__|    `-._ |              '-.|     '-.| |   |\n                                 `'                            '-._|\n");
            termPrint("+------------------------------------+\n| Choisir votre option de lancement :|\n|       1 - Nouvelle partie          |\n|       2 - Quitter le jeu           |\n+------------------------------------+");
        }
        function termPrint(text) {
            const term = document.getElementById('game-terminal');
            const line = document.createElement('div'); line.innerText = text;
            term.appendChild(line); term.scrollTop = term.scrollHeight;
        }
        document.getElementById('terminal-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { let v = e.target.value; e.target.value = ''; handlePokemonInput(v.trim()); }
        });
        function handlePokemonInput(input) {
            termPrint("> " + input);
            const s = pokemonState;
            if (s.gameState === 'start') {
                if (input === '1') { s.gameState = 'starter'; termPrint("\nChoisis ton starter :\n1 - Supmander\n2 - Suppasaur\n3 - Supirtle"); }
                else if (input === '2') termPrint("Au revoir !");
            } else if (s.gameState === 'starter') {
                let idx = parseInt(input) - 1;
                if (idx >= 0 && idx < 3) { s.player.pokedex.push({...s.pokemons[idx]}); s.player.numberPokemon = 1; s.gameState = 'main'; termPrint(`\nFélicitations ! Tu as choisi ${s.pokemons[idx].name}.`); showMainMenu(); }
                else termPrint("Choix invalide.");
            } else if (s.gameState === 'main') {
                if (input === '1') startWildBattle();
                else if (input === '2') showShop();
                else if (input === '3') showPokeCenter();
                else if (input === '4') showPokedex();
            } else if (s.gameState === 'wild') handleBattle(input);
            else if (['shop', 'center', 'pokedex'].includes(s.gameState)) { if (input === '0') { s.gameState = 'main'; showMainMenu(); } }
        }
        function showMainMenu() { termPrint("\n--- MENU PRINCIPAL ---\n1 - Explorer le monde (Sauvage)\n2 - Boutique\n3 - Centre Pokémon\n4 - Pokedex"); }
        function startWildBattle() {
            const enemy = {...pokemonState.pokemons[Math.floor(Math.random() * pokemonState.pokemons.length)]};
            pokemonState.enemy = enemy; pokemonState.gameState = 'wild';
            termPrint(`\nUn ${enemy.name} sauvage apparaît ! HP: ${enemy.hp}`);
            termPrint("1 - Attaquer\n2 - Capturer (Poke-ball)\n3 - Fuir");
        }
        function handleBattle(input) {
            const s = pokemonState, p = s.player.pokedex[0], e = s.enemy;
            if (input === '1') {
                let dmg = p.atk + Math.floor(Math.random() * 3); e.hp -= dmg;
                termPrint(`Vous attaquez ! ${e.name} perd ${dmg} HP.`);
                if (e.hp <= 0) { termPrint(`${e.name} est K.O ! Victoire.`); s.gameState = 'main'; showMainMenu(); return; }
                let edmg = e.atk; p.hp -= edmg;
                termPrint(`${e.name} attaque ! Votre pokémon perd ${edmg} HP.`);
                if (p.hp <= 0) { termPrint("Votre Pokémon est K.O... direction le centre."); p.hp = 0; s.gameState = 'main'; showMainMenu(); }
            } else if (input === '2') {
                if (Math.random() > 0.5) { termPrint(`Réussite ! ${e.name} a été capturé.`); s.player.pokedex.push(e); s.player.numberPokemon++; s.gameState = 'main'; showMainMenu(); }
                else termPrint("Échec de la capture !");
            } else if (input === '3') { termPrint("Vous fuyez."); s.gameState = 'main'; showMainMenu(); }
        }
        function showShop() { pokemonState.gameState = 'shop'; termPrint("\n--- BOUTIQUE ---\nPotions: 5 | Balls: 5\n(Tapez 0 pour quitter)"); }
        function showPokeCenter() { 
            pokemonState.gameState = 'center';
            pokemonState.player.pokedex.forEach(p => p.hp = p.maxHp);
            termPrint("\n--- CENTRE POKÉMON ---\nVos Pokémon ont été soignés !\n(Tapez 0 pour quitter)"); 
        }
        function showPokedex() {
            pokemonState.gameState = 'pokedex';
            termPrint("\n--- POKEDEX ---");
            pokemonState.player.pokedex.forEach((p, i) => termPrint(`${i+1}. ${p.name} (HP: ${p.hp}/${p.maxHp})`));
            termPrint("(Tapez 0 pour quitter)");
        }

        // --- Common ---
        function nextTurn() { currentPlayer = currentPlayer === 1 ? 2 : 1; updateTurnUI(); }
        function updateTurnUI() {
            const dot = document.querySelector('.turn-indicator .turn-dot');
            dot.className = 'turn-dot ' + (currentPlayer === 1 ? 'dot-player1' : 'dot-player2');
            document.getElementById('player-name').innerText = 'Joueur ' + currentPlayer + (gameMode === 'ia' && currentPlayer === 2 ? ' (IA)' : '');
        }
        function endGame(winner) { isGameOver = true; document.getElementById('player-name').innerText = 'Victoire du Joueur ' + winner + ' !'; }
        
        switchGame('snort');
    </script>
